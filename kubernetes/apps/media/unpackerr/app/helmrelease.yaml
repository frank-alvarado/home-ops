---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app unpackerr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  uninstall:
    keepHistory: false
  values:
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/onedr0p/unpackerr
      tag: rolling@sha256:96386a365fe63a5d254a79ecc9781d72e1efac00ae6391794e0c2218de69ff62
    env:
      TZ: "${TIMEZONE}"
      UN_WEBSERVER_METRICS: "true"
      UN_LIDARR_0_URL: https://lidarr.${SECRET_DOMAIN}
      UN_LIDARR_0_PATHS_0: /complete/lidarr
      UN_RADARR_0_URL: https://radarr.${SECRET_DOMAIN}
      UN_RADARR_0_PATHS_0: /complete/radarr
      UN_SONARR_0_URL: https://sonarr.${SECRET_DOMAIN}
      UN_SONARR_0_PATHS_0: /complete/sonarr
    envFrom:
      - secretRef:
          name: *app
    service:
      main:
        ports:
          http:
            port: 5656
    serviceMonitor:
      main:
        enabled: true
    probes:
      liveness:
        enabled: true
      readiness:
        enabled: true
      startup:
        enabled: true
    ppodSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
      supplementalGroups: [10000]
    persistence:
      complete:
        enabled: true
        existingClaim: media-nfs-share-complete-pvc
        mountPath: /complete
        readOnly: false
    podAnnotations:
      secret.reloader.stakater.com/reload: *app
    resources:
      requests:
        cpu: 10m
        memory: 250Mi
      limits:
        memory: 2000Mi
