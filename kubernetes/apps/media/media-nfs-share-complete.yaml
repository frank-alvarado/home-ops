---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs-share-complete-pv
spec:
  capacity:
    storage: 1Mi
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "192.168.1.119"
    path: /volume1/video/downloads
  mountOptions:
    - nfsvers=4.1
    - tcp
    - intr
    - hard
    - noatime
    - nodiratime
    - rsize=4096
    - wsize=4096
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-nfs-share-complete-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 1Mi
  volumeName: media-nfs-share-complete-pv
