---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./config-pvc.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: pmm-config
    files:
      - ./configs/config.yml
  - name: movie-config
    files:
      - ./configs/movies.yaml
  - name: tv-config
    files:
      - ./configs/tv.yaml
generatorOptions:
  disableNameSuffixHash: true
labels:
  - pairs:
      app.kubernetes.io/name: plex-meta-manager
      app.kubernetes.io/instance: plex-meta-manager
